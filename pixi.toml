[workspace]
name = "miatt-final-exam-sabbir-ahmed12"
version = "0.1.0"
description = "Multi-site brain MRI landmark detection pipeline"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.12.*"
numpy = ">=1.26,<2"
scipy = ">=1.11"
matplotlib = ">=3.8"
simpleitk = ">=2.3"
pandas = ">=2.0"
seaborn = ">=0.13"
tqdm = ">=4.66"
ipykernel = ">=6.0"
pytest = ">=8.0"
pytest-cov = ">=4.0"
hatchling = ">=1.21"

[pypi-options]
extra-index-urls = ["https://download.pytorch.org/whl/cu128"]

[pypi-dependencies]
torch = ">=2.3"
torchvision = ">=0.18"
monai = ">=1.3"
miatt = {path = ".", editable = true}

[tasks]
test   = "pytest tests/ -v --tb=short"
eda    = "python scripts/eda.py"
pipeline = "python scripts/run_pipeline.py"
